{% extends "base.html" %}
{% block content %}
<div class="admin-tabs">
  <a href="{{ url_for('admin_users') }}">Users</a>
  <a href="{{ url_for('admin_collections') }}">Collections</a>
  <a href="{{ url_for('admin_fields') }}">Fields</a>
  <a href="{{ url_for('admin_settings') }}">Settings</a>
</div>
<div class="page-head"><h1>Fields</h1></div>
{% if collections %}
  <form method="get" class="toolbar">
    <select name="collection_id">{% for collection in collections %}<option value="{{ collection.id }}" {% if selected_id == collection.id %}selected{% endif %}>{{ collection.name }}</option>{% endfor %}</select>
    <button type="submit">Select</button>
  </form>
  <form method="post" class="toolbar">
    <input type="hidden" name="collection_id" value="{{ selected_id }}">
    <input name="name" placeholder="Field name" required>
    <select name="field_type"><option>text</option><option>number</option><option>date</option><option>url</option></select>
    <button type="submit">Add field</button>
  </form>
  <div class="table-wrap"><table><tr><th>Name</th><th>Type</th></tr>{% for field in fields %}<tr><td>{{ field.name }}</td><td>{{ field.field_type }}</td></tr>{% endfor %}</table></div>
{% else %}
  <div class="empty">Create a collection first.</div>
{% endif %}
{% endblock %}
