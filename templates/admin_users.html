{% extends "base.html" %}
{% block content %}
<div class="admin-tabs">
  <a href="{{ url_for('admin_users') }}">Users</a>
  <a href="{{ url_for('admin_applicants') }}">Applicants</a>
  <a href="{{ url_for('admin_collections') }}">Collections</a>
  <a href="{{ url_for('admin_fields') }}">Fields</a>
  <a href="{{ url_for('admin_settings') }}">Settings</a>
</div>
<div class="page-head"><h1>Users</h1></div>
<form method="post" class="toolbar">
  {{ csrf_field()|safe }}
  <input name="username" placeholder="Username" required>
  <input name="password" type="password" placeholder="Password" required>
  <select name="role"><option>collector</option><option>viewer</option><option>admin</option></select>
  <button type="submit">Add user</button>
</form>
<div class="table-wrap"><table><tr><th>Username</th><th>Role</th><th>Created</th></tr>{% for user in users %}<tr><td>{{ user.username }}</td><td>{{ user.role }}</td><td>{{ user.created_at }}</td></tr>{% endfor %}</table></div>
{% endblock %}
