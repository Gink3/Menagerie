<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menagerie</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">Menagerie</a>
    {% if g.user %}
      <nav>
        <a href="{{ url_for('index') }}">Collections</a>
        {% if g.user.role == 'admin' %}
          <a href="{{ url_for('admin_users') }}">Admin</a>
        {% endif %}
      </nav>
      <button class="theme-toggle" type="button" aria-pressed="false">Dark</button>
      <form action="{{ url_for('logout') }}" method="post">
        <button class="link-button" type="submit">Log out</button>
      </form>
    {% endif %}
  </header>
  <main class="shell">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script>
    const themeToggle = document.querySelector(".theme-toggle");
    const savedTheme = localStorage.getItem("menagerie-theme") || "light";
    document.documentElement.dataset.theme = savedTheme;
    if (themeToggle) {
      const syncThemeToggle = () => {
        const dark = document.documentElement.dataset.theme === "dark";
        themeToggle.textContent = dark ? "Light" : "Dark";
        themeToggle.setAttribute("aria-pressed", dark ? "true" : "false");
      };
      syncThemeToggle();
      themeToggle.addEventListener("click", () => {
        const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem("menagerie-theme", nextTheme);
        syncThemeToggle();
      });
    }
  </script>
</body>
</html>
